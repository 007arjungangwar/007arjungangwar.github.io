services:
  - type: web
    name: arjun-coding-platform-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://007arjungangwar.github.io
      - key: DATA_DIR
        value: /var/data
    disk:
      name: coding-platform-data
      mountPath: /var/data
      sizeGB: 1
